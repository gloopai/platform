syntax = "proto3";

package servicehub;
option go_package = "github.com/gloopai/platform/common/pb/servicehub;servicehub";

// 平台支撑数据（admin_users / global_settings / RBAC / 审计 / 定时任务 / 门户通知等；代付状态见 order 服务）
service ServiceHub {
  rpc FindAdminUserByUsername(FindAdminUserByUsernameReq) returns (FindAdminUserByUsernameResp);
  rpc ListAdminUsers(ListAdminUsersReq) returns (ListAdminUsersResp);
  rpc GetDisplaySettings(GetDisplaySettingsReq) returns (GetDisplaySettingsResp);
  rpc UpsertDisplaySettings(UpsertDisplaySettingsReq) returns (GetDisplaySettingsResp);

  // ---- Admin RBAC (menu-level now; action-level reserved) ----
  rpc GetAdminRbacMyMenus(GetAdminRbacMyMenusReq) returns (GetAdminRbacMyMenusResp);
  rpc ListAdminRoles(ListAdminRolesReq) returns (ListAdminRolesResp);
  rpc CreateAdminRole(CreateAdminRoleReq) returns (CreateAdminRoleResp);
  rpc UpdateAdminRole(UpdateAdminRoleReq) returns (UpdateAdminRoleResp);
  rpc DeleteAdminRole(DeleteAdminRoleReq) returns (DeleteAdminRoleResp);
  rpc ListAdminMenus(ListAdminMenusReq) returns (ListAdminMenusResp);
  rpc CreateAdminMenu(CreateAdminMenuReq) returns (CreateAdminMenuResp);
  rpc UpdateAdminMenu(UpdateAdminMenuReq) returns (UpdateAdminMenuResp);
  rpc DeleteAdminMenu(DeleteAdminMenuReq) returns (DeleteAdminMenuResp);
  rpc GetAdminRoleMenus(GetAdminRoleMenusReq) returns (GetAdminRoleMenusResp);
  rpc SetAdminRoleMenus(SetAdminRoleMenusReq) returns (SetAdminRoleMenusResp);
  rpc GetAdminUserRoles(GetAdminUserRolesReq) returns (GetAdminUserRolesResp);
  rpc SetAdminUserRoles(SetAdminUserRolesReq) returns (SetAdminUserRolesResp);

  // ---- Admin RBAC permissions (action-level) ----
  rpc GetAdminRbacMyPerms(GetAdminRbacMyPermsReq) returns (GetAdminRbacMyPermsResp);

  // ---- Admin RBAC config (UI-managed) ----
  rpc ListAdminPermissions(ListAdminPermissionsReq) returns (ListAdminPermissionsResp);
  rpc CreateAdminPermission(CreateAdminPermissionReq) returns (CreateAdminPermissionResp);
  rpc UpdateAdminPermission(UpdateAdminPermissionReq) returns (UpdateAdminPermissionResp);
  rpc DeleteAdminPermission(DeleteAdminPermissionReq) returns (DeleteAdminPermissionResp);
  rpc GetAdminRolePermKeys(GetAdminRolePermKeysReq) returns (GetAdminRolePermKeysResp);
  rpc SetAdminRolePermKeys(SetAdminRolePermKeysReq) returns (SetAdminRolePermKeysResp);
  rpc ListAdminApiRules(ListAdminApiRulesReq) returns (ListAdminApiRulesResp);
  rpc UpsertAdminApiRule(UpsertAdminApiRuleReq) returns (UpsertAdminApiRuleResp);
  rpc DeleteAdminApiRule(DeleteAdminApiRuleReq) returns (DeleteAdminApiRuleResp);

  // ---- Admin operation audit logs ----
  rpc RecordAdminOperationLog(RecordAdminOperationLogReq) returns (RecordAdminOperationLogResp);
  rpc ListAdminOperationLogs(ListAdminOperationLogsReq) returns (ListAdminOperationLogsResp);
  // 删除早于 cutoff 的审计日志（供 job-worker 定时清理任务调用）
  rpc PurgeAdminOperationLogsBefore(PurgeAdminOperationLogsBeforeReq) returns (PurgeAdminOperationLogsBeforeResp);

  // ---- Admin users / MFA ----
  rpc CreateAdminUser(CreateAdminUserReq) returns (CreateAdminUserResp);
  rpc UpdateAdminUser(UpdateAdminUserReq) returns (UpdateAdminUserResp);
  rpc DeleteAdminUser(DeleteAdminUserReq) returns (DeleteAdminUserResp);
  rpc GetAdminUserById(GetAdminUserByIdReq) returns (GetAdminUserByIdResp);

  // ---- Portal notifications (SSE fan-out via Redis; merchant portal reserved) ----
  rpc PublishPortalNotification(PublishPortalNotificationReq) returns (PublishPortalNotificationResp);

  // ---- Scheduled jobs ----
  rpc ListScheduledJobs(ListScheduledJobsReq) returns (ListScheduledJobsResp);
  rpc CreateScheduledJob(CreateScheduledJobReq) returns (CreateScheduledJobResp);
  rpc UpdateScheduledJob(UpdateScheduledJobReq) returns (UpdateScheduledJobResp);
  rpc ToggleScheduledJob(ToggleScheduledJobReq) returns (ToggleScheduledJobResp);
  rpc RunScheduledJobNow(RunScheduledJobNowReq) returns (RunScheduledJobNowResp);
  rpc ListScheduledJobRuns(ListScheduledJobRunsReq) returns (ListScheduledJobRunsResp);
  rpc GetScheduledJobRun(GetScheduledJobRunReq) returns (GetScheduledJobRunResp);
  rpc RetryScheduledJobRun(RetryScheduledJobRunReq) returns (RetryScheduledJobRunResp);
  rpc ListJobWorkerNodes(ListJobWorkerNodesReq) returns (ListJobWorkerNodesResp);
}

message FindAdminUserByUsernameReq {
  string username = 1;
}

message FindAdminUserByUsernameResp {
  AdminUser user = 1;
}

message AdminUser {
  int64 id = 1;
  string username = 2;
  string password_hash = 3;
  int64 status = 4;
  string mfa_secret = 5;
  int64 mfa_enabled = 6;
}

message AdminUserPublic {
  int64 id = 1;
  string username = 2;
  int64 status = 3;
  int64 mfa_enabled = 4;
}

message ListAdminUsersReq {}

message ListAdminUsersResp {
  repeated AdminUserPublic users = 1;
}

message GetDisplaySettingsReq {}

message GetDisplaySettingsResp {
  string country_code = 1;
  string currency_code = 2;
  string currency_symbol = 3;
  double fiat_to_usdt_rate = 4;
  int64 admin_mfa_enabled = 5;
  // 新建商户自动分配的数字型 merchant_id 起始值（含），1～9999999999；与序列表联用取 max(已发号+1, 起始值)
  int64 merchant_numeric_id_start = 6;
}

message UpsertDisplaySettingsReq {
  string country_code = 1;
  string currency_code = 2;
  string currency_symbol = 3;
  double fiat_to_usdt_rate = 4;
  int64 admin_mfa_enabled = 5;
  int64 merchant_numeric_id_start = 6;
}

// ---------------- RBAC messages ----------------

message GetAdminRbacMyMenusReq {
  int64 admin_user_id = 1;
}

message AdminMenu {
  int64 id = 1;
  int64 parent_id = 2;
  string menu_key = 3;
  string label = 4;
  string icon = 5;
  int64 kind = 6; // 1=leaf 2=group
  string path = 7; // leaf only; vue-router path like "/stats"
  int64 sort_order = 8;
  string placement = 9; // "left" | "avatar"
}

message GetAdminRbacMyMenusResp {
  repeated AdminMenu menus = 1;
}

message ListAdminRolesReq {}

message AdminRole {
  int64 id = 1;
  string code = 2;
  string name = 3;
  int64 status = 4;
}

message ListAdminRolesResp {
  repeated AdminRole roles = 1;
}

message CreateAdminRoleReq {
  string code = 1;
  string name = 2;
  int64 status = 3;
}

message CreateAdminRoleResp {
  AdminRole role = 1;
}

message UpdateAdminRoleReq {
  int64 id = 1;
  string name = 2;
  int64 status = 3;
}

message UpdateAdminRoleResp {
  AdminRole role = 1;
}

message DeleteAdminRoleReq {
  int64 id = 1;
}

message DeleteAdminRoleResp {
  bool ok = 1;
}

message ListAdminMenusReq {}

message ListAdminMenusResp {
  repeated AdminMenu menus = 1;
}

message CreateAdminMenuReq {
  int64 parent_id = 1;
  string menu_key = 2;
  string label = 3;
  string icon = 4;
  int64 kind = 5;
  string path = 6;
  int64 sort_order = 7;
  string placement = 8;
}

message CreateAdminMenuResp {
  AdminMenu menu = 1;
}

message UpdateAdminMenuReq {
  int64 id = 1;
  int64 parent_id = 2;
  string menu_key = 3;
  string label = 4;
  string icon = 5;
  int64 kind = 6;
  string path = 7;
  int64 sort_order = 8;
  string placement = 9;
}

message UpdateAdminMenuResp {
  AdminMenu menu = 1;
}

message DeleteAdminMenuReq {
  int64 id = 1;
}

message DeleteAdminMenuResp {
  bool ok = 1;
}

message GetAdminRoleMenusReq {
  int64 role_id = 1;
}

message GetAdminRoleMenusResp {
  repeated int64 menu_ids = 1;
}

message SetAdminRoleMenusReq {
  int64 role_id = 1;
  repeated int64 menu_ids = 2;
}

message SetAdminRoleMenusResp {
  bool ok = 1;
}

message GetAdminUserRolesReq {
  int64 admin_user_id = 1;
}

message GetAdminUserRolesResp {
  repeated int64 role_ids = 1;
}

message SetAdminUserRolesReq {
  int64 admin_user_id = 1;
  repeated int64 role_ids = 2;
}

message SetAdminUserRolesResp {
  bool ok = 1;
}

message GetAdminRbacMyPermsReq {
  int64 admin_user_id = 1;
}

message GetAdminRbacMyPermsResp {
  bool is_super_admin = 1;
  repeated string perm_keys = 2;
}

message AdminPermission {
  int64 id = 1;
  string perm_key = 2;
  string label = 3;
  string category = 4;
  int64 status = 5;
  // 对应侧栏菜单项 menu_key，便于按「页面」归类能力；空表示未绑定具体菜单。
  string menu_key = 6;
}

// page_size=0：不分页，返回全部（兼容旧客户端与网关中间件缓存全量规则）。
message ListAdminPermissionsReq {
  int64 page = 1;       // 1-based；仅当 page_size>0 时有效
  int64 page_size = 2;  // 每页条数；0 表示不分页
  string q = 3;       // 可选；匹配 label / perm_key / menu_key / category（子串）
  string menu_key = 4; // 可选筛选：空=全部；"__empty__"=未绑定菜单（menu_key 为空）
}
message ListAdminPermissionsResp {
  repeated AdminPermission permissions = 1;
  int64 total = 2;
}

message CreateAdminPermissionReq {
  string perm_key = 1;
  string label = 2;
  string category = 3;
  int64 status = 4;
  string menu_key = 5;
}
message CreateAdminPermissionResp { AdminPermission permission = 1; }

message UpdateAdminPermissionReq {
  int64 id = 1;
  string label = 2;
  string category = 3;
  int64 status = 4;
  string menu_key = 5;
}
message UpdateAdminPermissionResp { AdminPermission permission = 1; }

message DeleteAdminPermissionReq { int64 id = 1; }
message DeleteAdminPermissionResp { bool ok = 1; }

message GetAdminRolePermKeysReq { int64 role_id = 1; }
message GetAdminRolePermKeysResp { repeated string perm_keys = 1; }
message SetAdminRolePermKeysReq { int64 role_id = 1; repeated string perm_keys = 2; }
message SetAdminRolePermKeysResp { bool ok = 1; }

message AdminApiRule {
  int64 id = 1;
  string method = 2;
  string path_pattern = 3;
  string perm_key = 4;
  int64 status = 5;
  string remark = 6;
}
message ListAdminApiRulesReq {
  int64 page = 1;
  int64 page_size = 2; // 0 = 不分页，返回全部
  string q = 3;        // 可选；匹配 method / path_pattern / perm_key / remark
  string perm_key = 4; // 可选；精确匹配 perm_key；空=不过滤
}
message ListAdminApiRulesResp {
  repeated AdminApiRule rules = 1;
  int64 total = 2;
}
message UpsertAdminApiRuleReq {
  string method = 1;
  string path_pattern = 2;
  string perm_key = 3;
  int64 status = 4;
  string remark = 5;
}
message UpsertAdminApiRuleResp { AdminApiRule rule = 1; }
message DeleteAdminApiRuleReq { int64 id = 1; }
message DeleteAdminApiRuleResp { bool ok = 1; }

message CreateAdminUserReq {
  string username = 1;
  string password_hash = 2;
  int64 status = 3;
}
message CreateAdminUserResp { AdminUserPublic user = 1; }

message UpdateAdminUserReq {
  int64 id = 1;
  int64 status = 2;
  string password_hash = 3;
  string mfa_secret = 4;
  int64 mfa_enabled = 5;
}
message UpdateAdminUserResp { AdminUserPublic user = 1; }

message DeleteAdminUserReq { int64 id = 1; }
message DeleteAdminUserResp { bool ok = 1; }

message GetAdminUserByIdReq { int64 id = 1; }
message GetAdminUserByIdResp { AdminUser user = 1; }

// NotificationPortal matches Redis/SSE routing; MERCHANT reserved for merchant console.
enum NotificationPortal {
  NOTIFICATION_PORTAL_UNSPECIFIED = 0;
  NOTIFICATION_PORTAL_ADMIN = 1;
  NOTIFICATION_PORTAL_MERCHANT = 2;
}

message PublishPortalNotificationReq {
  NotificationPortal portal = 1;
  // If true, deliver to all connected clients for that portal (admin or merchant).
  bool broadcast = 2;
  // When broadcast=false and portal=ADMIN: target these admin user ids.
  repeated int64 admin_user_ids = 3;
  // When broadcast=false and portal=MERCHANT: target these merchant ids (string ids).
  repeated string merchant_ids = 4;
  string title = 5;
  string body = 6;
  // info | warning | error (UI hint)
  string severity = 7;
  // Vue-router path e.g. "/payin-orders"
  string link_path = 8;
  // JSON object as string for query params
  string link_query_json = 9;
  string meta_json = 10;
}

message PublishPortalNotificationResp {
  string notification_id = 1;
}

message ScheduledJob {
  int64 id = 1;
  string job_key = 2;
  string name = 3;
  string category = 4;
  bool enabled = 5;
  bool builtin = 6;
  string schedule_type = 7;
  string cron_expr = 8;
  int64 interval_seconds = 9;
  string timezone = 10;
  string payload_json = 11;
  string concurrency_policy = 12;
  string misfire_policy = 13;
  int64 max_retry = 14;
  int64 retry_backoff_seconds = 15;
  int64 next_run_at = 16;
  int64 last_run_at = 17;
  string last_status = 18;
  string last_error = 19;
  string updated_by = 20;
}

message ScheduledJobRun {
  int64 id = 1;
  int64 job_id = 2;
  string job_key = 3;
  string job_name = 4;
  string trigger_type = 5;
  int64 scheduled_at = 6;
  int64 started_at = 7;
  int64 finished_at = 8;
  int64 duration_ms = 9;
  string status = 10;
  int64 attempt = 11;
  string worker_id = 12;
  string summary = 13;
  string error_code = 14;
  string error_message = 15;
  string output_json = 16;
  string correlation_id = 17;
}

message ListScheduledJobsReq {
  int64 limit = 1;
  int64 offset = 2;
}
message ListScheduledJobsResp {
  repeated ScheduledJob jobs = 1;
  int64 total = 2;
}

message CreateScheduledJobReq {
  string job_key = 1;
  string name = 2;
  string category = 3;
  bool enabled = 4;
  string schedule_type = 5;
  string cron_expr = 6;
  int64 interval_seconds = 7;
  string timezone = 8;
  string payload_json = 9;
  string concurrency_policy = 10;
  string misfire_policy = 11;
  int64 max_retry = 12;
  int64 retry_backoff_seconds = 13;
  string updated_by = 14;
}
message CreateScheduledJobResp { ScheduledJob job = 1; }

message UpdateScheduledJobReq {
  int64 id = 1;
  string name = 2;
  string category = 3;
  string schedule_type = 4;
  string cron_expr = 5;
  int64 interval_seconds = 6;
  string timezone = 7;
  string payload_json = 8;
  string concurrency_policy = 9;
  string misfire_policy = 10;
  int64 max_retry = 11;
  int64 retry_backoff_seconds = 12;
  int64 next_run_at = 13;
  string updated_by = 14;
}
message UpdateScheduledJobResp { ScheduledJob job = 1; }

message ToggleScheduledJobReq {
  int64 id = 1;
  bool enabled = 2;
  string updated_by = 3;
}
message ToggleScheduledJobResp { ScheduledJob job = 1; }

message RunScheduledJobNowReq {
  int64 id = 1;
  string correlation_id = 2;
}
message RunScheduledJobNowResp { bool ok = 1; }

message ListScheduledJobRunsReq {
  int64 job_id = 1;
  string status = 2;
  string trigger_type = 3;
  int64 limit = 4;
  int64 offset = 5;
}
message ListScheduledJobRunsResp {
  repeated ScheduledJobRun runs = 1;
  int64 total = 2;
}

message GetScheduledJobRunReq { int64 id = 1; }
message GetScheduledJobRunResp { ScheduledJobRun run = 1; }

message RetryScheduledJobRunReq { int64 id = 1; }
message RetryScheduledJobRunResp { bool ok = 1; }

message ListJobWorkerNodesReq {}
message JobWorkerNode {
  string worker_id = 1;
  string hostname = 2;
  int64 last_heartbeat_at = 3;
  int64 running_tasks = 4;
  int64 success_last_hour = 5;
}
message ListJobWorkerNodesResp {
  repeated JobWorkerNode nodes = 1;
  int64 queued_total = 2;
}

message RecordAdminOperationLogReq {
  string request_id = 1;
  int64 admin_user_id = 2;
  string admin_username = 3;
  string operator_ip = 4;
  string user_agent = 5;
  string method = 6;
  string path = 7;
  string query_string = 8;
  string perm_key = 9;
  int32 http_status = 10;
  bool success = 11;
  int64 duration_ms = 12;
  string error_message = 13;
}

message RecordAdminOperationLogResp {}

message ListAdminOperationLogsReq {
  int64 start_sec = 1;
  int64 end_sec = 2;
  int64 admin_user_id = 3;
  string method = 4;
  string path_keyword = 5;
  string perm_key = 6;
  optional bool success = 7;
  int64 limit = 8;
  int64 offset = 9;
}

message AdminOperationLogRow {
  int64 id = 1;
  int64 created_at = 2;
  string request_id = 3;
  int64 admin_user_id = 4;
  string admin_username = 5;
  string operator_ip = 6;
  string user_agent = 7;
  string method = 8;
  string path = 9;
  string query_string = 10;
  string perm_key = 11;
  int32 http_status = 12;
  bool success = 13;
  int64 duration_ms = 14;
  string error_message = 15;
}

message ListAdminOperationLogsResp {
  repeated AdminOperationLogRow rows = 1;
  int64 total = 2;
}

message PurgeAdminOperationLogsBeforeReq {
  int64 cutoff_unix_sec = 1;
}

message PurgeAdminOperationLogsBeforeResp {
  int64 deleted = 1;
}
