syntax = "proto3";

package merchant;
option go_package = "github.com/gloopai/pay/common/pb/merchant;merchant";

service Merchant {
  rpc GetMerchant(GetMerchantReq) returns(GetMerchantResp);
  rpc GetAuthInfo(GetAuthInfoReq) returns(GetAuthInfoResp);
  rpc ListMerchants(ListMerchantsReq) returns(ListMerchantsResp);
  rpc CreateMerchant(CreateMerchantReq) returns(UpsertMerchantResp);
  rpc UpdateMerchant(UpdateMerchantReq) returns(UpsertMerchantResp);
  rpc ReplaceMerchantPayinProducts(ReplaceMerchantPayinProductsReq) returns (ReplaceMerchantPayinProductsResp);
  rpc ReplaceMerchantPayoutProducts(ReplaceMerchantPayoutProductsReq) returns (ReplaceMerchantPayoutProductsResp);
  rpc ListMerchantPayinProductIds(ListMerchantPayinProductIdsReq) returns (ListMerchantPayinProductIdsResp);
  rpc ListMerchantPayoutProductIds(ListMerchantPayoutProductIdsReq) returns (ListMerchantPayoutProductIdsResp);
}

message MerchantPayinGrant {
  int64 payin_product_id = 1;
  // 对客代收比例：万分比整数 (= round(百分数×100))；与订单 fee_rate_bps 同语义
  optional int64 merchant_rate_bps = 2;
}

message MerchantPayoutGrant {
  int64 payout_product_id = 1;
  // 对客代付比例部分：万分比整数 (= round(百分数×100))；与订单 fee_rate_bps 同语义
  optional int64 merchant_rate_bps = 2;
  // 计费模式：1=仅比例 2=仅固定 3=固定+比例（与订单 fee_mode 一致）
  int64 fee_mode = 3;
  // 对客代付固定部分（分）；与订单 fee_fixed_amount 同语义
  int64 fee_fixed_amount = 4;
}

message MerchantInfo {
  string merchant_id = 1;
  string app_secret = 2;
  int64 status = 3;
  string ip_whitelist = 6;
  int64 balance = 7;
  int64 frozen_balance = 8;
  int64 withdrawn_amount = 9;
  int64 payin_balance = 16;
  int64 available_balance = 17;
  string notify_url = 10;
  string return_url = 11;
  repeated int64 payin_product_ids = 12;
  repeated int64 payout_product_ids = 13;
  repeated MerchantPayinGrant payin_grants = 14;
  repeated MerchantPayoutGrant payout_grants = 15;
  string app_id = 18;
  string email = 19;
  // 商户侧自由 JSON（与 Consul 双写；OpenAPI 验签等热路径可优先读内存缓存）
  string merchant_config = 20;
}

message GetMerchantReq {
  string merchant_id = 1;
}

message GetMerchantResp {
  MerchantInfo merchant = 1;
}

message GetAuthInfoReq {
  string merchant_id = 1;
  string app_id = 2;
  string email = 3;
}

message GetAuthInfoResp {
  string app_secret = 1;
  int64 status = 2;
  string ip_whitelist = 3;
  string notify_url = 4;
  string return_url = 5;
  int64 balance = 6;
  int64 payin_balance = 9;
  int64 available_balance = 10;
  string merchant_id = 11;
  string app_id = 12;
  string email = 13;
  string password_hash = 14;
}

message ListMerchantsReq {
  int64 limit = 1;
}

message ListMerchantsResp {
  repeated MerchantInfo merchants = 1;
}

message CreateMerchantReq {
  string merchant_id = 1;
  string app_secret = 2;
  int64 status = 3;
  string notify_url = 6;
  string return_url = 7;
  string ip_whitelist = 8;
  repeated int64 payin_product_ids = 9;
  repeated int64 payout_product_ids = 10;
  string app_id = 11;
  string email = 12;
  string password_hash = 13;
  string merchant_config = 14;
}

message UpdateMerchantReq {
  string merchant_id = 1;
  string app_secret = 2;
  int64 status = 3;
  string notify_url = 6;
  string return_url = 7;
  string ip_whitelist = 8;
  string password_hash = 9;
  optional string merchant_config = 10;
}

message UpsertMerchantResp {
  MerchantInfo merchant = 1;
}

message ReplaceMerchantPayinProductsReq {
  string merchant_id = 1;
  repeated MerchantPayinGrant grants = 2;
}

message ReplaceMerchantPayinProductsResp {
  bool ok = 1;
}

message ReplaceMerchantPayoutProductsReq {
  string merchant_id = 1;
  repeated MerchantPayoutGrant grants = 2;
}

message ReplaceMerchantPayoutProductsResp {
  bool ok = 1;
}

message ListMerchantPayinProductIdsReq {
  string merchant_id = 1;
}

message ListMerchantPayinProductIdsResp {
  repeated MerchantPayinGrant grants = 1;
}

message ListMerchantPayoutProductIdsReq {
  string merchant_id = 1;
}

message ListMerchantPayoutProductIdsResp {
  repeated MerchantPayoutGrant grants = 1;
}
