syntax = "proto3";

package settle;
option go_package = "github.com/gloopai/pay/common/pb/settle;settle";

service Settle {
  rpc Credit(CreditReq) returns(CreditResp);
  rpc DebitPayout(DebitPayoutReq) returns(DebitPayoutResp);
  rpc TransferCollectToPayout(TransferCollectToPayoutReq) returns(TransferCollectToPayoutResp);
  rpc ListFundLogs(ListFundLogsReq) returns(ListFundLogsResp);
}

message CreditReq {
  string merchant_id = 1;
  string order_no = 2;
  int64 amount = 3;
  string reason = 4;
}

message CreditResp {
  bool changed = 1;
  int64 balance = 2;
}

message DebitPayoutReq {
  string merchant_id = 1;
  string order_no = 2;
  int64 amount = 3;
  string reason = 4;
}

message DebitPayoutResp {
  bool changed = 1;
  int64 payout_balance = 2;
}

message TransferCollectToPayoutReq {
  string merchant_id = 1;
  int64 amount = 2;
  string reason = 3;
}

message TransferCollectToPayoutResp {
  bool changed = 1;
  int64 collect_balance = 2;
  int64 payout_balance = 3;
}

message ListFundLogsReq {
  string merchant_id = 1;
  int64 limit = 2;
}

message FundLogItem {
  int64 id = 1;
  string order_no = 2;
  string change_type = 3;
  int64 amount = 4;
  int64 balance_before = 5;
  int64 balance_after = 6;
  string reason = 7;
  int64 created_at = 8;
  string merchant_id = 9;
}

message ListFundLogsResp {
  repeated FundLogItem logs = 1;
}
