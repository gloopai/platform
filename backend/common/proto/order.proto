syntax = "proto3";

package order;
option go_package = "github.com/gloopai/pay/common/pb/order;order";

service Order {
  rpc CreateOrder(CreateOrderReq) returns(CreateOrderResp);
  rpc GetOrder(GetOrderReq) returns(GetOrderResp);
  rpc MarkPaid(MarkPaidReq) returns(MarkPaidResp);
  rpc ListOrders(ListOrdersReq) returns(ListOrdersResp);
  rpc TodaySummary(TodaySummaryReq) returns(TodaySummaryResp);
  // 收银台：用户选定支付产品后落库路由并返回可展示/跳转的支付载体（E2）
  rpc PrepareTerminalPay(PrepareTerminalPayReq) returns (PrepareTerminalPayResp);
  // 管理台：今日订单统计（读 trade 库 orders）
  rpc AdminTodayOverview(AdminTodayOverviewReq) returns (AdminTodayOverviewResp);
  // 商户控制台：回调通知尝试记录
  rpc ListMerchantNotifyLogs(ListMerchantNotifyLogsReq) returns (ListMerchantNotifyLogsResp);
  // 管理台：跨商户订单列表（merchant_id 为空则不限商户）
  rpc AdminListOrders(AdminListOrdersReq) returns (AdminListOrdersResp);
  // 管理台：按自然日聚合订单（对账「平台账」快照；与上游文件比对为后续）
  rpc AdminDayOverview(AdminDayOverviewReq) returns (AdminDayOverviewResp);
}

message CreateOrderReq {
  string merchant_id = 1;
  string merchant_order_no = 2;
  int64 amount = 3;
  string currency = 4;
  string subject = 5;
  string return_url = 6;
  string notify_url = 7;
  string pay_type = 8;
  int64 channel_id = 9;
  int64 pay_product_id = 10;
  string pay_product_code = 11;
  // 下单时由网关/交易写入：商户 API 指定通道时为 1
  int32 channel_locked = 12;
}

message CreateOrderResp {
  OrderInfo order = 1;
  bool existed = 2;
}

message GetOrderReq {
  string merchant_id = 1;
  string order_no = 2;
  string merchant_order_no = 3;
}

message GetOrderResp {
  OrderInfo order = 1;
}

message MarkPaidReq {
  string order_no = 1;
  int64 paid_amount = 2;
  string upstream_trade_no = 3;
  int64 channel_id = 4;
}

message MarkPaidResp {
  bool changed = 1;
}

message OrderInfo {
  string order_no = 1;
  string merchant_id = 2;
  string merchant_order_no = 3;
  int64 amount = 4;
  string currency = 5;
  int32 status = 6;
  int64 channel_id = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
  string return_url = 10;
  string notify_url = 11;
  string upstream_trade_no = 12;
  int64 paid_amount = 13;
  int64 pay_product_id = 14;
  string pay_product_code = 15;
  int32 channel_locked = 16;
}

message ListOrdersReq {
  string merchant_id = 1;
  string keyword = 2;
  int32 status = 3;
  int64 limit = 4;
}

message ListOrdersResp {
  repeated OrderInfo orders = 1;
}

message TodaySummaryReq {
  string merchant_id = 1;
}

message TodaySummaryResp {
  int64 total_amount = 1;
  int64 total_count = 2;
  int64 success_count = 3;
}

message PrepareTerminalPayReq {
  string order_no = 1;
  // 用户在收银台选择的支付产品编码；为空则沿用订单已有编码
  string pay_product_code = 2;
}

message PrepareTerminalPayResp {
  int64 channel_id = 1;
  int64 pay_product_id = 2;
  string pay_product_code = 3;
  // 跳转或二维码内容（mock 场景可与 pay_url 相同）
  string pay_url = 4;
  string qr_payload = 5;
  // mock | qr | redirect
  string pay_mode = 6;
}

message AdminTodayOverviewReq {}

message AdminStatsTotals {
  int64 order_count = 1;
  int64 paid_amount = 2;
  int64 paid_count = 3;
  int64 failed_count = 4;
  int64 pending_count = 5;
  int64 closed_count = 6;
  double conversion_rate_pct = 7;
  double terminal_success_rate_pct = 8;
}

message AdminStatsProductRow {
  string product_code = 1;
  string product_name = 2;
  int64 order_count = 3;
  int64 paid_amount = 4;
  int64 paid_count = 5;
  int64 failed_count = 6;
  double conversion_rate_pct = 7;
  double terminal_success_rate_pct = 8;
}

message AdminStatsChannelRow {
  int64 channel_id = 1;
  string channel_name = 2;
  int64 order_count = 3;
  int64 paid_amount = 4;
  int64 paid_count = 5;
  int64 failed_count = 6;
  double conversion_rate_pct = 7;
  double terminal_success_rate_pct = 8;
}

message AdminTodayOverviewResp {
  string range = 1;
  AdminStatsTotals totals = 2;
  repeated AdminStatsProductRow by_pay_product = 3;
  repeated AdminStatsChannelRow by_channel = 4;
  int64 enabled_channels = 5;
  int64 fused_channels = 6;
}

message ListMerchantNotifyLogsReq {
  string merchant_id = 1;
  string order_no = 2;
  int64 limit = 3;
}

message MerchantNotifyLogItem {
  int64 id = 1;
  string notify_url = 2;
  int64 attempt = 3;
  int64 http_status = 4;
  string response_body = 5;
  string error_msg = 6;
  int64 created_at = 7;
}

message ListMerchantNotifyLogsResp {
  repeated MerchantNotifyLogItem logs = 1;
}

message AdminListOrdersReq {
  string merchant_id = 1;
  string keyword = 2;
  // 未设置或 -1：不按状态筛选；0～3 与订单状态一致
  optional int32 status = 3;
  int64 limit = 4;
}

message AdminListOrdersResp {
  repeated OrderInfo orders = 1;
}

message AdminDayOverviewReq {
  // 自然日 YYYY-MM-DD（服务器本地时区）
  string date = 1;
}

message AdminDayOverviewResp {
  string date = 1;
  AdminStatsTotals totals = 2;
  repeated AdminStatsProductRow by_pay_product = 3;
  repeated AdminStatsChannelRow by_channel = 4;
}
