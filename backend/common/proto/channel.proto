syntax = "proto3";

package channel;
option go_package = "github.com/gloopai/pay/common/pb/channel;channel";

service Channel {
  rpc Route(RouteReq) returns(RouteResp);
  rpc GetSignSecret(GetSignSecretReq) returns(GetSignSecretResp);

  rpc ListChannels(ListChannelsReq) returns (ListChannelsResp);
  rpc CreateChannel(UpsertChannelReq) returns (UpsertChannelResp);
  rpc UpdateChannel(UpsertChannelReq) returns (UpsertChannelResp);

  rpc GetRoutingSummary(GetRoutingSummaryReq) returns (GetRoutingSummaryResp);

  rpc ListTerminalPayProducts(ListTerminalPayProductsReq) returns (ListTerminalPayProductsResp);
  rpc MerchantHasPayProductCode(MerchantHasPayProductCodeReq) returns (MerchantHasPayProductCodeResp);
  rpc ResolveLockedChannelForMerchant(ResolveLockedChannelForMerchantReq) returns (ResolveLockedChannelForMerchantResp);
  rpc GetPayProductDisplayName(GetPayProductDisplayNameReq) returns (GetPayProductDisplayNameResp);

  rpc AdminListPayProducts(AdminListPayProductsReq) returns (AdminListPayProductsResp);
  rpc AdminCreatePayProduct(AdminCreatePayProductReq) returns (AdminUpsertPayProductResp);
  rpc AdminUpdatePayProduct(AdminUpdatePayProductReq) returns (AdminUpsertPayProductResp);
  rpc AdminListPayProductBindings(AdminListPayProductBindingsReq) returns (AdminListPayProductBindingsResp);
  rpc AdminUpsertPayProductBinding(AdminUpsertPayProductBindingReq) returns (AdminUpsertPayProductBindingResp);
  rpc AdminUpdatePayProductBinding(AdminUpdatePayProductBindingReq) returns (AdminUpdatePayProductBindingResp);
  rpc AdminDeletePayProductBinding(AdminDeletePayProductBindingReq) returns (AdminDeletePayProductBindingResp);

  rpc AdminListPayoutProducts(AdminListPayoutProductsReq) returns (AdminListPayoutProductsResp);
  rpc AdminCreatePayoutProduct(AdminCreatePayoutProductReq) returns (AdminUpsertPayoutProductResp);
  rpc AdminUpdatePayoutProduct(AdminUpdatePayoutProductReq) returns (AdminUpsertPayoutProductResp);
  rpc AdminListPayoutProductBindings(AdminListPayoutProductBindingsReq) returns (AdminListPayoutProductBindingsResp);
  rpc AdminUpsertPayoutProductBinding(AdminUpsertPayoutProductBindingReq) returns (AdminUpsertPayoutProductBindingResp);
  rpc AdminUpdatePayoutProductBinding(AdminUpdatePayoutProductBindingReq) returns (AdminUpdatePayoutProductBindingResp);
  rpc AdminDeletePayoutProductBinding(AdminDeletePayoutProductBindingReq) returns (AdminDeletePayoutProductBindingResp);
}

message RouteReq {
  int64 amount = 1;
  string pay_type = 2;
}

message RouteResp {
  int64 channel_id = 1;
  int64 pay_product_id = 2;
}

message GetSignSecretReq {
  int64 channel_id = 1;
}

message GetSignSecretResp {
  string sign_secret = 1;
}

message ListChannelsReq {}

message ChannelRow {
  int64 id = 1;
  string name = 2;
  string pay_type = 3;
  string gateway_url = 4;
  string upstream_merchant_no = 5;
  string rsa_private_key = 6;
  string sign_secret = 7;
  int64 weight = 8;
  int64 min_amount = 9;
  int64 max_amount = 10;
  bool enabled = 11;
  bool fuse_enabled = 12;
  bool supports_collect = 13;
  bool supports_payout = 14;
  int64 upstream_collect_rate_bps = 15;
  int64 upstream_payout_rate_bps = 16;
}

message ListChannelsResp {
  repeated ChannelRow channels = 1;
}

message UpsertChannelReq {
  int64 id = 1;
  string name = 2;
  string pay_type = 3;
  string gateway_url = 4;
  string upstream_merchant_no = 5;
  string rsa_private_key = 6;
  string sign_secret = 7;
  int64 weight = 8;
  int64 min_amount = 9;
  int64 max_amount = 10;
  bool enabled = 11;
  bool fuse_enabled = 12;
  bool supports_collect = 13;
  bool supports_payout = 14;
  int64 upstream_collect_rate_bps = 15;
  int64 upstream_payout_rate_bps = 16;
}

message UpsertChannelResp {
  ChannelRow channel = 1;
}

message GetRoutingSummaryReq {}

message GetRoutingSummaryResp {
  string algorithm_key = 1;
  string algorithm_label = 2;
  int64 enabled_pay_products = 3;
  int64 enabled_payout_products = 4;
  int64 enabled_channels = 5;
  int64 active_bindings = 6;
  int64 active_payout_bindings = 7;
  int64 merchants_with_collect_whitelist = 8;
  int64 merchants_with_payout_whitelist = 9;
  int64 fused_channels = 10;
}

message ListTerminalPayProductsReq {
  string merchant_id = 1;
  int64 amount = 2;
}

message PayProductOption {
  string code = 1;
  string name = 2;
}

message ListTerminalPayProductsResp {
  repeated PayProductOption products = 1;
}

message MerchantHasPayProductCodeReq {
  string merchant_id = 1;
  string pay_product_code = 2;
}

message MerchantHasPayProductCodeResp {
  bool ok = 1;
}

message ResolveLockedChannelForMerchantReq {
  string merchant_id = 1;
  int64 channel_id = 2;
  int64 amount = 3;
}

message ResolveLockedChannelForMerchantResp {
  int64 pay_product_id = 1;
  string pay_product_code = 2;
}

message GetPayProductDisplayNameReq {
  string code = 1;
}

message GetPayProductDisplayNameResp {
  string name = 1;
}

message AdminListPayProductsReq {}

message AdminPayProductRow {
  int64 id = 1;
  string code = 2;
  string name = 3;
  int64 sort_order = 4;
  bool enabled = 5;
}

message AdminListPayProductsResp {
  repeated AdminPayProductRow products = 1;
}

message AdminCreatePayProductReq {
  string code = 1;
  string name = 2;
  int64 sort_order = 3;
  bool enabled = 4;
}

message AdminUpdatePayProductReq {
  int64 id = 1;
  string code = 2;
  string name = 3;
  int64 sort_order = 4;
  bool enabled = 5;
}

message AdminUpsertPayProductResp {
  AdminPayProductRow product = 1;
}

message AdminListPayProductBindingsReq {
  int64 pay_product_id = 1;
}

message AdminPayProductBindingRow {
  int64 id = 1;
  int64 pay_product_id = 2;
  int64 channel_id = 3;
  string channel_name = 4;
  int64 weight = 5;
  bool enabled = 6;
  reserved 7;
  reserved "cost_rate_bps";
}

message AdminListPayProductBindingsResp {
  repeated AdminPayProductBindingRow bindings = 1;
}

message AdminUpsertPayProductBindingReq {
  int64 pay_product_id = 1;
  int64 channel_id = 2;
  int64 weight = 3;
  bool enabled = 4;
  reserved 5;
  reserved "cost_rate_bps";
}

message AdminUpsertPayProductBindingResp {
  AdminPayProductBindingRow binding = 1;
}

message AdminUpdatePayProductBindingReq {
  int64 id = 1;
  int64 weight = 2;
  bool enabled = 3;
  reserved 4;
  reserved "cost_rate_bps";
}

message AdminUpdatePayProductBindingResp {
  AdminPayProductBindingRow binding = 1;
}

message AdminDeletePayProductBindingReq {
  int64 id = 1;
}

message AdminDeletePayProductBindingResp {
  bool ok = 1;
}

message AdminListPayoutProductsReq {}

message AdminPayoutProductRow {
  int64 id = 1;
  string code = 2;
  string name = 3;
  int64 sort_order = 4;
  bool enabled = 5;
}

message AdminListPayoutProductsResp {
  repeated AdminPayoutProductRow products = 1;
}

message AdminCreatePayoutProductReq {
  string code = 1;
  string name = 2;
  int64 sort_order = 3;
  bool enabled = 4;
}

message AdminUpdatePayoutProductReq {
  int64 id = 1;
  string code = 2;
  string name = 3;
  int64 sort_order = 4;
  bool enabled = 5;
}

message AdminUpsertPayoutProductResp {
  AdminPayoutProductRow product = 1;
}

message AdminListPayoutProductBindingsReq {
  int64 payout_product_id = 1;
}

message AdminPayoutProductBindingRow {
  int64 id = 1;
  int64 payout_product_id = 2;
  int64 channel_id = 3;
  string channel_name = 4;
  int64 weight = 5;
  bool enabled = 6;
  reserved 7;
  reserved "cost_rate_bps";
}

message AdminListPayoutProductBindingsResp {
  repeated AdminPayoutProductBindingRow bindings = 1;
}

message AdminUpsertPayoutProductBindingReq {
  int64 payout_product_id = 1;
  int64 channel_id = 2;
  int64 weight = 3;
  bool enabled = 4;
  reserved 5;
  reserved "cost_rate_bps";
}

message AdminUpsertPayoutProductBindingResp {
  AdminPayoutProductBindingRow binding = 1;
}

message AdminUpdatePayoutProductBindingReq {
  int64 id = 1;
  int64 weight = 2;
  bool enabled = 3;
  reserved 4;
  reserved "cost_rate_bps";
}

message AdminUpdatePayoutProductBindingResp {
  AdminPayoutProductBindingRow binding = 1;
}

message AdminDeletePayoutProductBindingReq {
  int64 id = 1;
}

message AdminDeletePayoutProductBindingResp {
  bool ok = 1;
}
