syntax = "proto3";

package channel;
option go_package = "github.com/gloopai/pay/common/pb/channel;channel";

import "merchant.proto";

service Channel {
  rpc Route(RouteReq) returns(RouteResp);
  // OpenAPI 代收下单：白名单 + 选路 + GetMerchant（计费用）合并为一次往返，降低网关延迟。
  rpc PreparePayinOrder(PreparePayinOrderReq) returns (PreparePayinOrderResp);
  rpc GetSignSecret(GetSignSecretReq) returns(GetSignSecretResp);

  // 按主键取单条通道（供通道回调等按 channel_id 热路径，避免 ListChannels 全表扫描）
  rpc GetChannel(GetChannelReq) returns (GetChannelResp);

  // 通道：代收创建、异步通知验签与应答正文（仅 core 内加载 driver；其他服务只走本 RPC）
  rpc ChannelCreatePayment(ChannelCreatePaymentReq) returns (ChannelCreatePaymentResp);
  rpc ChannelVerifyPayinNotify(ChannelVerifyPayinNotifyReq) returns (ChannelVerifyPayinNotifyResp);
  rpc ChannelBuildPayinNotifyResponse(ChannelBuildPayinNotifyResponseReq) returns (ChannelBuildPayinNotifyResponseResp);
  rpc ChannelVerifyPayoutNotify(ChannelVerifyPayoutNotifyReq) returns (ChannelVerifyPayoutNotifyResp);
  rpc ChannelBuildPayoutNotifyResponse(ChannelBuildPayoutNotifyResponseReq) returns (ChannelBuildPayoutNotifyResponseResp);

  rpc ListChannels(ListChannelsReq) returns (ListChannelsResp);
  rpc CreateChannel(UpsertChannelReq) returns (UpsertChannelResp);
  rpc UpdateChannel(UpsertChannelReq) returns (UpsertChannelResp);

  rpc GetRoutingSummary(GetRoutingSummaryReq) returns (GetRoutingSummaryResp);

  rpc ListTerminalPayinProducts(ListTerminalPayinProductsReq) returns (ListTerminalPayinProductsResp);
  rpc MerchantHasPayinProductCode(MerchantHasPayinProductCodeReq) returns (MerchantHasPayinProductCodeResp);
  rpc ResolveLockedChannelForMerchant(ResolveLockedChannelForMerchantReq) returns (ResolveLockedChannelForMerchantResp);
  rpc GetPayinProductDisplayName(GetPayinProductDisplayNameReq) returns (GetPayinProductDisplayNameResp);

  rpc AdminListPayinProducts(AdminListPayinProductsReq) returns (AdminListPayinProductsResp);
  rpc AdminCreatePayinProduct(AdminCreatePayinProductReq) returns (AdminUpsertPayinProductResp);
  rpc AdminUpdatePayinProduct(AdminUpdatePayinProductReq) returns (AdminUpsertPayinProductResp);
  rpc AdminListPayinProductBindings(AdminListPayinProductBindingsReq) returns (AdminListPayinProductBindingsResp);
  rpc AdminUpsertPayinProductBinding(AdminUpsertPayinProductBindingReq) returns (AdminUpsertPayinProductBindingResp);
  rpc AdminUpdatePayinProductBinding(AdminUpdatePayinProductBindingReq) returns (AdminUpdatePayinProductBindingResp);
  rpc AdminDeletePayinProductBinding(AdminDeletePayinProductBindingReq) returns (AdminDeletePayinProductBindingResp);

  rpc AdminListPayoutProducts(AdminListPayoutProductsReq) returns (AdminListPayoutProductsResp);
  rpc AdminCreatePayoutProduct(AdminCreatePayoutProductReq) returns (AdminUpsertPayoutProductResp);
  rpc AdminUpdatePayoutProduct(AdminUpdatePayoutProductReq) returns (AdminUpsertPayoutProductResp);
  rpc AdminListPayoutProductBindings(AdminListPayoutProductBindingsReq) returns (AdminListPayoutProductBindingsResp);
  rpc AdminUpsertPayoutProductBinding(AdminUpsertPayoutProductBindingReq) returns (AdminUpsertPayoutProductBindingResp);
  rpc AdminUpdatePayoutProductBinding(AdminUpdatePayoutProductBindingReq) returns (AdminUpdatePayoutProductBindingResp);
  rpc AdminDeletePayoutProductBinding(AdminDeletePayoutProductBindingReq) returns (AdminDeletePayoutProductBindingResp);
}

message RouteReq {
  int64 amount = 1;
  string payin_type = 2;
}

message RouteResp {
  int64 channel_id = 1;
  int64 payin_product_id = 2;
}

message PreparePayinOrderReq {
  string merchant_id = 1;
  int64 amount = 2;
  // 支付产品 code；空表示不跑选路与白名单（channel_id/payin_product_id 为 0），仍返回 merchant 供计费。
  string payin_type = 3;
}

message PreparePayinOrderResp {
  int64 channel_id = 1;
  int64 payin_product_id = 2;
  string payin_product_code = 3;
  merchant.MerchantInfo merchant = 4;
}

message GetSignSecretReq {
  int64 channel_id = 1;
  // 为 true 时只读数据库；OpenAPI 收银台勿设，可走 Consul 内存。
  bool authoritative_db = 2;
}

message GetSignSecretResp {
  string sign_secret = 1;
}

message ListChannelsReq {}

message GetChannelReq {
  int64 channel_id = 1;
  // 为 true 时只读数据库；OpenAPI/回调热路径勿设。
  bool authoritative_db = 2;
}

message GetChannelResp {
  ChannelRow channel = 1;
}

message ChannelCreatePaymentReq {
  int64 channel_id = 1;
  string merchant_order_no = 2;
  int64 amount_minor = 3;
  string payer_name = 4;
  string payer_phone = 5;
  string payer_email = 6;
  string user_ip = 7;
  string notify_url = 8;
}

message ChannelCreatePaymentResp {
  string pay_url = 1;
  string channel_order_no = 2;
}

message ChannelVerifyPayinNotifyReq {
  int64 channel_id = 1;
  string expected_order_no = 2;
  string method = 3;
  map<string, string> header = 4;
  bytes body = 5;
}

message ChannelVerifyPayinNotifyResp {
  bool verify_ok = 1;
  string merchant_order_no = 2;
  string channel_order_no = 3;
  int64 paid_amount_minor = 4;
  // 与 contracts.PayinOrderStatus 一致：0 unknown, 1 processing, 2 success, 3 failed
  int32 payin_status = 5;
  string raw_status = 6;
  bytes response_body = 7;
  string response_content_type = 8;
}

message ChannelBuildPayinNotifyResponseReq {
  int64 channel_id = 1;
  bool success = 2;
}

message ChannelBuildPayinNotifyResponseResp {
  bytes body = 1;
  string content_type = 2;
}

message ChannelVerifyPayoutNotifyReq {
  int64 channel_id = 1;
  string expected_order_no = 2;
  string method = 3;
  map<string, string> header = 4;
  bytes body = 5;
}

message ChannelVerifyPayoutNotifyResp {
  bool verify_ok = 1;
  string merchant_order_no = 2;
  string channel_order_no = 3;
  int64 amount_minor = 4;
  int32 payout_status = 5;
  string reference_no = 6;
  string raw_status = 7;
  bytes response_body = 8;
  string response_content_type = 9;
}

message ChannelBuildPayoutNotifyResponseReq {
  int64 channel_id = 1;
  bool success = 2;
}

message ChannelBuildPayoutNotifyResponseResp {
  bytes body = 1;
  string content_type = 2;
}

message ChannelRow {
  int64 id = 1;
  string name = 2;
  string payin_type = 3;
  string gateway_url = 4;
  string channel_merchant_no = 5;
  string rsa_private_key = 6;
  string sign_secret = 7;
  int64 weight = 8;
  int64 min_amount = 9;
  int64 max_amount = 10;
  bool enabled = 11;
  bool fuse_enabled = 12;
  bool supports_payin = 13;
  bool supports_payout = 14;
  // 平台相对通道(PSP)：代收成本比例，万分比整数 (= round(百分数×100))
  int64 channel_payin_rate_bps = 15;
  // 平台相对通道：代付成本比例，同上
  int64 channel_payout_rate_bps = 16;
  // 通道代付计费模式：1=仅比例 2=仅固定 3=固定+比例
  int64 channel_payout_fee_mode = 17;
  // 通道代付固定成本（分）
  int64 channel_payout_fixed_fee = 18;
  // 通道对接自由 JSON 文本（管理台整段保存；运行时自行解析）
  string channel_config = 19;
  // 合并 legacy 列 + supports_* 后的 JSON，供 driver 绑定（由 GetChannel 填充；ListChannels 可能为空）
  string bind_channel_config_json = 20;
  // channel_config 中 gateway_url 优先，否则列 gateway_url（由 GetChannel 填充）
  string effective_gateway_url = 21;
}

message ListChannelsResp {
  repeated ChannelRow channels = 1;
}

message UpsertChannelReq {
  int64 id = 1;
  string name = 2;
  string payin_type = 3;
  string gateway_url = 4;
  string channel_merchant_no = 5;
  string rsa_private_key = 6;
  string sign_secret = 7;
  int64 weight = 8;
  int64 min_amount = 9;
  int64 max_amount = 10;
  bool enabled = 11;
  bool fuse_enabled = 12;
  bool supports_payin = 13;
  bool supports_payout = 14;
  // 以下四项语义与 ChannelRow 一致（平台相对通道成本）
  int64 channel_payin_rate_bps = 15;
  int64 channel_payout_rate_bps = 16;
  int64 channel_payout_fee_mode = 17;
  int64 channel_payout_fixed_fee = 18;
  string channel_config = 19;
}

message UpsertChannelResp {
  ChannelRow channel = 1;
}

message GetRoutingSummaryReq {}

message GetRoutingSummaryResp {
  string algorithm_key = 1;
  string algorithm_label = 2;
  int64 enabled_payin_products = 3;
  int64 enabled_payout_products = 4;
  int64 enabled_channels = 5;
  int64 active_bindings = 6;
  int64 active_payout_bindings = 7;
  int64 merchants_with_payin_whitelist = 8;
  int64 merchants_with_payout_whitelist = 9;
  int64 fused_channels = 10;
}

message ListTerminalPayinProductsReq {
  string merchant_id = 1;
  int64 amount = 2;
}

message PayinProductOption {
  string code = 1;
  string name = 2;
}

message ListTerminalPayinProductsResp {
  repeated PayinProductOption products = 1;
}

message MerchantHasPayinProductCodeReq {
  string merchant_id = 1;
  string payin_product_code = 2;
}

message MerchantHasPayinProductCodeResp {
  bool ok = 1;
}

message ResolveLockedChannelForMerchantReq {
  string merchant_id = 1;
  int64 channel_id = 2;
  int64 amount = 3;
}

message ResolveLockedChannelForMerchantResp {
  int64 payin_product_id = 1;
  string payin_product_code = 2;
}

message GetPayinProductDisplayNameReq {
  string code = 1;
  // 为 true 时只读库表展示名；OpenAPI 勿设，可走内存快照。
  bool authoritative_db = 2;
}

message GetPayinProductDisplayNameResp {
  string name = 1;
}

message AdminListPayinProductsReq {}

message AdminPayinProductRow {
  int64 id = 1;
  string code = 2;
  string name = 3;
  int64 sort_order = 4;
  bool enabled = 5;
  string product_config = 6;
}

message AdminListPayinProductsResp {
  repeated AdminPayinProductRow products = 1;
}

message AdminCreatePayinProductReq {
  string code = 1;
  string name = 2;
  int64 sort_order = 3;
  bool enabled = 4;
  string product_config = 5;
}

message AdminUpdatePayinProductReq {
  int64 id = 1;
  string code = 2;
  string name = 3;
  int64 sort_order = 4;
  bool enabled = 5;
  string product_config = 6;
}

message AdminUpsertPayinProductResp {
  AdminPayinProductRow product = 1;
}

message AdminListPayinProductBindingsReq {
  int64 payin_product_id = 1;
}

message AdminPayinProductBindingRow {
  int64 id = 1;
  int64 payin_product_id = 2;
  int64 channel_id = 3;
  string channel_name = 4;
  int64 weight = 5;
  bool enabled = 6;
  reserved 7;
  reserved "cost_rate_bps";
}

message AdminListPayinProductBindingsResp {
  repeated AdminPayinProductBindingRow bindings = 1;
}

message AdminUpsertPayinProductBindingReq {
  int64 payin_product_id = 1;
  int64 channel_id = 2;
  int64 weight = 3;
  bool enabled = 4;
  reserved 5;
  reserved "cost_rate_bps";
}

message AdminUpsertPayinProductBindingResp {
  AdminPayinProductBindingRow binding = 1;
}

message AdminUpdatePayinProductBindingReq {
  int64 id = 1;
  int64 weight = 2;
  bool enabled = 3;
  reserved 4;
  reserved "cost_rate_bps";
}

message AdminUpdatePayinProductBindingResp {
  AdminPayinProductBindingRow binding = 1;
}

message AdminDeletePayinProductBindingReq {
  int64 id = 1;
}

message AdminDeletePayinProductBindingResp {
  bool ok = 1;
}

message AdminListPayoutProductsReq {}

message AdminPayoutProductRow {
  int64 id = 1;
  string code = 2;
  string name = 3;
  int64 sort_order = 4;
  bool enabled = 5;
  string product_config = 6;
}

message AdminListPayoutProductsResp {
  repeated AdminPayoutProductRow products = 1;
}

message AdminCreatePayoutProductReq {
  string code = 1;
  string name = 2;
  int64 sort_order = 3;
  bool enabled = 4;
  string product_config = 5;
}

message AdminUpdatePayoutProductReq {
  int64 id = 1;
  string code = 2;
  string name = 3;
  int64 sort_order = 4;
  bool enabled = 5;
  string product_config = 6;
}

message AdminUpsertPayoutProductResp {
  AdminPayoutProductRow product = 1;
}

message AdminListPayoutProductBindingsReq {
  int64 payout_product_id = 1;
}

message AdminPayoutProductBindingRow {
  int64 id = 1;
  int64 payout_product_id = 2;
  int64 channel_id = 3;
  string channel_name = 4;
  int64 weight = 5;
  bool enabled = 6;
  reserved 7;
  reserved "cost_rate_bps";
}

message AdminListPayoutProductBindingsResp {
  repeated AdminPayoutProductBindingRow bindings = 1;
}

message AdminUpsertPayoutProductBindingReq {
  int64 payout_product_id = 1;
  int64 channel_id = 2;
  int64 weight = 3;
  bool enabled = 4;
  reserved 5;
  reserved "cost_rate_bps";
}

message AdminUpsertPayoutProductBindingResp {
  AdminPayoutProductBindingRow binding = 1;
}

message AdminUpdatePayoutProductBindingReq {
  int64 id = 1;
  int64 weight = 2;
  bool enabled = 3;
  reserved 4;
  reserved "cost_rate_bps";
}

message AdminUpdatePayoutProductBindingResp {
  AdminPayoutProductBindingRow binding = 1;
}

message AdminDeletePayoutProductBindingReq {
  int64 id = 1;
}

message AdminDeletePayoutProductBindingResp {
  bool ok = 1;
}
