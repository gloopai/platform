syntax = "proto3";

package order;
option go_package="./order";

service Order {
  rpc CreateOrder(CreateOrderReq) returns(CreateOrderResp);
  rpc GetOrder(GetOrderReq) returns(GetOrderResp);
  rpc MarkPaid(MarkPaidReq) returns(MarkPaidResp);
}

message CreateOrderReq {
  string merchant_id = 1;
  string merchant_order_no = 2;
  int64 amount = 3;
  string currency = 4;
  string subject = 5;
  string return_url = 6;
  string notify_url = 7;
  string pay_type = 8;
  int64 channel_id = 9;
}

message CreateOrderResp {
  OrderInfo order = 1;
  bool existed = 2;
}

message GetOrderReq {
  string merchant_id = 1;
  string order_no = 2;
  string merchant_order_no = 3;
}

message GetOrderResp {
  OrderInfo order = 1;
}

message MarkPaidReq {
  string order_no = 1;
  int64 paid_amount = 2;
  string upstream_trade_no = 3;
  int64 channel_id = 4;
}

message MarkPaidResp {
  bool changed = 1;
}

message OrderInfo {
  string order_no = 1;
  string merchant_id = 2;
  string merchant_order_no = 3;
  int64 amount = 4;
  string currency = 5;
  int32 status = 6;
  int64 channel_id = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
  string return_url = 10;
  string notify_url = 11;
  string upstream_trade_no = 12;
}
