ServiceName: gateway
AdminServer:
  Name: gateway-admin-api
  Host: 0.0.0.0
  Port: 8080
MerchantServer:
  Name: gateway-merchant-api
  Host: 0.0.0.0
  Port: 8088
OpenAPIServer:
  Name: gateway-openapi-api
  Host: 0.0.0.0
  Port: 8090
CheckoutServer:
  Name: gateway-checkout-api
  Host: 0.0.0.0
  Port: 8092
Timezone: Asia/Shanghai
OpenAPI:
  MaxBodyBytes: 262144
  TrustForwardedFor: false
Consul:
  Addr: 127.0.0.1:8500
  Service: gateway-admin-api
ReplayGuard:
  RedisAddr: 127.0.0.1:6379
  RedisPassword: "yourpassword"
  RedisDB: 2
  KeyPrefix: pay:openapi:replay
  AllowedSkewSeconds: 300
  TTLSeconds: 600
RateLimit:
  RedisAddr: 127.0.0.1:6379
  RedisPassword: "yourpassword"
  RedisDB: 3
  KeyPrefix: pay:openapi:ratelimit
  # -1 = 关闭 OpenAPI 限流（本地压测）；0 = 未配置时用默认 600；线上可改为 600 等正整数
  OpenAPILimitPerWindow: -1
  OpenAPIWindowSeconds: 60
  LoginLimitPerWindow: 60
  LoginWindowSeconds: 60
AdminToken: admin_token_change_me
JwtSecret: jwt_secret_change_me
CheckoutBaseUrl: http://127.0.0.1:5174/
TradeRpc:
  Target: consul://127.0.0.1:8500/payment.rpc.trade
  Middlewares:
    Trace: true
CoreRpc:
  Target: consul://127.0.0.1:8500/payment.rpc.core
  Middlewares:
    Trace: true
ServiceHubRpc:
  Target: consul://127.0.0.1:8500/payment.rpc.service-hub
  Middlewares:
    Trace: true
OpsMonitor:
  # 运维监控页额外纳入的 Consul 服务名（默认也会包含 gateway/trade/core）
  Services:
    - payment.worker.notice-consumer
Nsq:
  NsqdTCPAddr: 127.0.0.1:4150
  Topic: merchant_notice
