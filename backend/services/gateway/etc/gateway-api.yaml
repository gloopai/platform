ServiceName: gateway

# 脚手架：仅 Admin HTTP（见 gateway.go）
AdminServer:
  Name: gateway-admin-api
  Host: 0.0.0.0
  Port: 8080

Timezone: Asia/Shanghai

OpenAPI:
  MaxBodyBytes: 262144
  TrustForwardedFor: false

Consul:
  Addr: 127.0.0.1:8500
  Service: gateway-admin-api

# 登录限流（与 Admin /login 共用 Redis）
RateLimit:
  RedisAddr: 127.0.0.1:6379
  RedisPassword: "yourpassword"
  RedisDB: 3
  KeyPrefix: gateway:admin:ratelimit
  LoginLimitPerWindow: 60
  LoginWindowSeconds: 60

AdminToken: admin_token_change_me
JwtSecret: jwt_secret_change_me

ServiceHubRpc:
  Target: consul://127.0.0.1:8500/payment.rpc.service-hub
  Middlewares:
    Trace: true

# 运维页额外 Consul 服务名（可选）
OpsMonitor:
  Services: []
