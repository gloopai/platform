Name: payment.rpc.trade
ListenOn: 0.0.0.0:8081
Timezone: Asia/Shanghai
Middlewares:
  Trace: true
  Stat: true
CoreRpc:
  Target: consul://127.0.0.1:8500/payment.rpc.core
  Middlewares:
    Trace: true
Consul:
  Addr: 127.0.0.1:8500
  Service: payment.rpc.trade
Mysql:
  DataSource: root:your_password@tcp(127.0.0.1:3306)/pay?charset=utf8mb4&parseTime=true
BizRedis:
  Addr: 127.0.0.1:6379
  Password: "yourpassword"
  DB: 1

# 通道异步回调基址（与 OpenAPIServer 同端口，默认 :8090），用于 CreatePayment 的 notifyUrl
Channel:
  CheckoutNotifyBaseURL: "http://127.0.0.1:8090"
