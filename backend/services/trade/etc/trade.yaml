Name: payment.rpc.trade
ListenOn: 0.0.0.0:8081
Timezone: Asia/Shanghai
Middlewares:
  Trace: true
  Stat: true
Consul:
  Addr: 127.0.0.1:8500
  Service: payment.rpc.trade
Mysql:
  DataSource: root:your_password@tcp(127.0.0.1:3306)/pay?charset=utf8mb4&parseTime=true
Redis:
  Host: 127.0.0.1:6379
  Key: payment.rpc.trade
BizRedis:
  Addr: 127.0.0.1:6379
  Password: "yourpassword"
  DB: 1

# 上游异步回调基址（gateway checkout 端口），用于 mock_psp CreatePayment 的 notifyUrl
Upstream:
  CheckoutNotifyBaseURL: "http://127.0.0.1:8092"
